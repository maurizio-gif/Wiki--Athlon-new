# ── DECAP CMS CONFIG ── wiki.athlonroma.it
backend:
  name: git-gateway
  branch: main

# Media (immagini negli articoli)
media_folder: "public/uploads"
public_folder: "/uploads"

# Lingua UI CMS
locale: "it"

# Collezione articoli
collections:
  - name: "articles"
    label: "Articoli Wiki"
    label_singular: "Articolo"
    folder: "src/content/articles"
    # Crea sottocartelle per area automaticamente basandosi sullo slug
    create: true
    slug: "{{area_slug}}/{{slug}}"
    # Editor con preview live
    editor:
      preview: false
    # Ordinamento default
    sortable_fields: ["title", "area", "order"]
    # Campi visibili nella lista articoli
    summary: "{{area}} / {{title}}"
    fields:
      - label: "Titolo"
        name: "title"
        widget: "string"
        hint: "Titolo dell'articolo (es. 'Come sospendere un abbonamento')"

      - label: "Descrizione / Sommario"
        name: "description"
        widget: "string"
        hint: "Una riga che riassume l'articolo — appare nelle card e come intro dell'articolo"

      - label: "Area / Categoria"
        name: "area"
        widget: "select"
        multiple: true
        min: 1
        options:
          - "Generali"
          - "Adulti – Club"
          - "Scuola Nuoto Bambini"
        hint: "Puoi selezionare più aree se l'articolo è pertinente a più sezioni"

      - label: "Slug URL"
        name: "area_slug"
        widget: "select"
        options:
          - label: "generali/"
            value: "generali"
          - label: "adulti/"
            value: "adulti"
          - label: "snb/ (Scuola Nuoto Bambini)"
            value: "snb"
        hint: "Cartella dell'URL — deve corrispondere all'area principale"

      - label: "Ordine nella sezione"
        name: "order"
        widget: "number"
        default: 99
        hint: "Numero più basso = appare prima nella lista (es. 1 = primo)"

      - label: "Tag"
        name: "tags"
        widget: "list"
        allow_add: true
        hint: "Parole chiave per la ricerca (es. disdetta, abbonamento, piscina)"

      - label: "Bozza (non pubblicare)"
        name: "draft"
        widget: "boolean"
        default: false
        hint: "Se attivo, l'articolo non viene pubblicato sul sito"

      - label: "Contenuto"
        name: "body"
        widget: "markdown"
        hint: |
          Scrivi il contenuto in Markdown. Guida rapida:
          ## Titolo sezione
          ### Sottotitolo
          **testo in grassetto**
          - elemento lista
          1. elemento numerato
          > citazione o nota importante
          [testo link](https://url.it)
        # Editor markdown con toolbar
        buttons:
          - bold
          - italic
          - link
          - heading-two
          - heading-three
          - quote
          - bulleted-list
          - numbered-list
        editor_components: []
