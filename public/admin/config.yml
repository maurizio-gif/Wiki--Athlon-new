# ── DECAP CMS CONFIG ── wiki.athlonroma.it
backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

locale: "it"

collections:

  # ── GENERALI ──
  - name: "generali"
    label: "Generali"
    label_singular: "Articolo Generali"
    folder: "src/content/articles/generali"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    sortable_fields: ["title", "order"]
    fields:
      - { label: "Titolo", name: "title", widget: "string" }
      - { label: "Descrizione / Sommario", name: "description", widget: "string", hint: "Una riga che riassume l'articolo — appare nelle card" }
      - label: "Area / Categoria"
        name: "area"
        widget: "select"
        multiple: true
        min: 1
        options: ["Generali", "Adulti – Club", "Scuola Nuoto Bambini"]
        default: ["Generali"]
      - { label: "Ordine nella sezione", name: "order", widget: "number", default: 99, hint: "Numero più basso = appare prima" }
      - { label: "Tag", name: "tags", widget: "list", allow_add: true }
      - { label: "Bozza (non pubblicare)", name: "draft", widget: "boolean", default: false }
      - label: "Contenuto"
        name: "body"
        widget: "markdown"
        buttons: [bold, italic, link, heading-two, heading-three, quote, bulleted-list, numbered-list]

  # ── ADULTI – CLUB ──
  - name: "adulti"
    label: "Adulti – Club"
    label_singular: "Articolo Adulti"
    folder: "src/content/articles/adulti"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    sortable_fields: ["title", "order"]
    fields:
      - { label: "Titolo", name: "title", widget: "string" }
      - { label: "Descrizione / Sommario", name: "description", widget: "string" }
      - label: "Area / Categoria"
        name: "area"
        widget: "select"
        multiple: true
        min: 1
        options: ["Generali", "Adulti – Club", "Scuola Nuoto Bambini"]
        default: ["Adulti – Club"]
      - { label: "Ordine nella sezione", name: "order", widget: "number", default: 99 }
      - { label: "Tag", name: "tags", widget: "list", allow_add: true }
      - { label: "Bozza (non pubblicare)", name: "draft", widget: "boolean", default: false }
      - label: "Contenuto"
        name: "body"
        widget: "markdown"
        buttons: [bold, italic, link, heading-two, heading-three, quote, bulleted-list, numbered-list]

  # ── SCUOLA NUOTO BAMBINI ──
  - name: "snb"
    label: "Scuola Nuoto Bambini"
    label_singular: "Articolo SNB"
    folder: "src/content/articles/snb"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    sortable_fields: ["title", "order"]
    fields:
      - { label: "Titolo", name: "title", widget: "string" }
      - { label: "Descrizione / Sommario", name: "description", widget: "string" }
      - label: "Area / Categoria"
        name: "area"
        widget: "select"
        multiple: true
        min: 1
        options: ["Generali", "Adulti – Club", "Scuola Nuoto Bambini"]
        default: ["Scuola Nuoto Bambini"]
      - { label: "Ordine nella sezione", name: "order", widget: "number", default: 99 }
      - { label: "Tag", name: "tags", widget: "list", allow_add: true }
      - { label: "Bozza (non pubblicare)", name: "draft", widget: "boolean", default: false }
      - label: "Contenuto"
        name: "body"
        widget: "markdown"
        buttons: [bold, italic, link, heading-two, heading-three, quote, bulleted-list, numbered-list]
